<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3d element</title>
</head>

<style>

@keyframes ani{

from {transform: rotateY(0deg) rotateX(0deg) rotateZ(0deg) ;}    
to {transform: rotateY(360deg) rotateX(350deg) rotateZ(260deg) ;}  
}


#container{
width: 500px;
height: 500px;
background-color: black;
margin: auto;
text-align: center;
perspective: 200px;    

}

#p1{
width: 200px;
height: 200px;
background-color: black;
position:relative;
top: 100px;
left: 100px;
animation: ani 5s linear infinite alternate;
 
}

#p2{

width: 200px;
height: 200px;
background-color: black;
position:relative;
top: -100px;
left: 100px;
backface-visibility: hidden;
animation: ani 5s linear infinite alternate;

}

.pic{
width: 100%;
height: 100%;
}
</style>


<body>
<div id="container">

<div id="p1">
<img src="images/tiger.jpeg" class="pic">

</div>

<div id="p2">
<img src="images/tigercubs.jpg" class="pic">

</div>

</div>  
    

</body>
</html>
