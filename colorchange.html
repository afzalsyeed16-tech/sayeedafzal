<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<script>

var b=document.createElement("button");
b.innerHTML="change random color of background"
b.style.padding="15px 25px"
b.style.fontFamily="arial black"
b.style.display="flex"
b.style.flexWrap="wrap"
b.style.alignItems="center"
b.style.margin="auto"
b.style.marginTop="20px"
b.style.fontSize="larger"
b.style.fontWeight="bold"
b.style.cursor="pointer"
b.style.borderRadius="10px"
b.style.boxShadow="3px 5px 15px gray"
document.body.appendChild(b)
function randomcolor(){

var red = Math.round(Math.random() * 255)
var green= Math.round(Math.random() * 255)
var blue=Math.round(Math.random() * 255)
var c= "rgb("+red+","+green+","+blue+")"
document.body.style.background=c


}

b.onclick=randomcolor

</script>





</body>
</html>
