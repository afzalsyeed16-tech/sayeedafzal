<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<h1>Create Tage By JavaScript</h1>

<script>

var p=document.createElement("img")
document.body.appendChild(p)
p.src="images/background4.jpg"
p.style="transition:0.60s; margin:20px;border-radius:10px;cursor:pointer;"
document.title="CreateElement"
p.style.width="50%"
p.style.boxShadow="10px 10px 10px gray"


p.onclick=function()
{

p.src="images/background3.jpeg"    

}

p.onmouseout=function()
{

p.src="images/background4.jpg"  
p.style.transform="scale(1)"   
}

p.onmouseover=function()
{
this.style.transform="scale(1.05)"

}

</script>


</body>
</html>
