<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
</head>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
<style>

#menu{
background: #0a1931;
width: 140px;
height: 20px;
color: #f6fafd;
}

ol{

background: #0a1931;
list-style: none;
position: relative; 
left: -200px;
top: -24px;   

}

ol li{

    padding: 10px;
    margin-left: -40px;
}

ol li:hover{

background: #f6fafd;
color: #0a1931;

}

#menu:hover ol{

left: 0px;
width: 100px;
cursor: pointer;    

}

</style>

<body>
  
<main>
<div id="menu">
<span class="material-symbols-outlined">menu</span>
<ol>
    <li>Home</li>
    <li>About</li>
    <li>Contact</li>
    <li>Products</li>
    <li>Services</li>
</ol>
</div>

</main>    

</body>
</html>
