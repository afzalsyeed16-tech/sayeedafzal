<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Block</title>
</head>

<style>

div{
border:1px black solid;
    
}

#header{
    width: 90%;
    margin: auto;
}

#col1{
width: 100px;
height: 100px;
padding: 5px;
text-align: center;
float: left;
margin: 3px;
}

#col2{
width:400px;
height:400px;
text-align: center;
float: left;
margin: 3px;
}

#col3{
width:140px;
height: 400px;
padding:5px;
text-align: center;
float: left;
}

#main{
width:99%;
height:300px;
margin: auto;
text-align: center;
float: left;

}

#footer{
width:100%;
height:200px;
margin:auto;
color: white;
background: black;
text-align: center;
padding: 10px;
clear:both;

}
</style>



<body>

<div id="header">
    
    <div id="col1">col1</div>
    <div id="col2">col2</div>
    <div id="col3">col3</div>
</div>

<div id="main">main</div>
<div id="footer">footer</div>

    
</body>
</html>
