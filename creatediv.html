<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreateDiv</title>
</head>
<style>
    

.box{
border-radius: 10px;
transition: 0.5s;
width:300px;

border: 3px solid black;
position: absolute;
top:100px;
left:100px;
text-align: center;
}

.mystyle{

//background: black;

}

</style>

<body>
    
<script>

document.title="CreateDiv"

var d=document.createElement("div");
document.body.appendChild(d);

d.className= "box mystyle"

d.innerHTML="<button style='margin-top:10px; margin-left:230px; 'onclick='closedlog()'>X</button>"

d.innerHTML+="<h1>Amazone</h1>"
d.innerHTML+="<hr color='green' size='4'/>"
d.innerHTML+="<img src='images/amazone.gif' style='width:100%;height:100%'>"

function closedlog(){

document.body.removeChild(d)

}

</script>


</body>
</html>
